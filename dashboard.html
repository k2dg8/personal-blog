<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magmatum & LogicLoom Dashboard</title>
    <style>
        /* --- CSS STYLING --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            padding-top: 50px;
        }

        .dashboard-container {
            width: 90%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { color: #333; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #555; text-transform: uppercase; font-size: 12px; }

        /* Button Styling */
        button { 
            padding: 8px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: 0.2s;
        }

        .btn-edit { background-color: #e3f2fd; color: #007bff; margin-right: 8px; }
        .btn-edit:hover { background-color: #007bff; color: white; }

        .btn-delete { background-color: #ffebee; color: #dc3545; }
        .btn-delete:hover { background-color: #dc3545; color: white; }

        /* Modal Background */
        .modal-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        /* Modal Box */
        .modal-box {
            background: white;
            width: 400px;
            margin: 100px auto;
            padding: 25px;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-box h3 { margin-top: 0; color: #333; }
        
        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Important for width */
        }

        .modal-footer { display: flex; gap: 10px; }
        .btn-save { background-color: #28a745; color: white; flex: 1; }
        .btn-cancel { background-color: #6c757d; color: white; flex: 1; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h2>Project Dashboard</h2>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Project Name</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr data-id="1">
                    <td>#001</td>
                    <td class="project-name">Magmatum Tech Blog</td>
                    <td><span style="color: green;">● Active</span></td>
                    <td>
                        <button class="btn-edit" onclick="openEditModal(1)">Edit</button>
                        <button class="btn-delete" onclick="deleteRow(1)">Delete</button>
                    </td>
                </tr>
                <tr data-id="2">
                    <td>#002</td>
                    <td class="project-name">LogicLoom Daily</td>
                    <td><span style="color: orange;">● Pending</span></td>
                    <td>
                        <button class="btn-edit" onclick="openEditModal(2)">Edit</button>
                        <button class="btn-delete" onclick="deleteRow(2)">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-box">
            <h3>Edit Project Name</h3>
            <p id="editingIdText" style="font-size: 12px; color: #888;"></p>
            
            <input type="hidden" id="editIdInput">
            <input type="text" id="editNameInput" placeholder="Enter new name...">
            
            <div class="modal-footer">
                <button class="btn-save" onclick="saveChanges()">Save Update</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        const modal = document.getElementById('modalOverlay');
        const nameInput = document.getElementById('editNameInput');
        const idInput = document.getElementById('editIdInput');
        const idText = document.getElementById('editingIdText');

        // 1. OPEN MODAL
        function openEditModal(id) {
            // Find the row and current name
            const row = document.querySelector(`tr[data-id="${id}"]`);
            const currentName = row.querySelector('.project-name').innerText;

            // Set values in the modal
            idInput.value = id;
            nameInput.value = currentName;
            idText.innerText = "Editing ID: " + id;

            // Show modal
            modal.style.display = 'block';
        }

        // 2. CLOSE MODAL
        function closeModal() {
            modal.style.display = 'none';
        }

        // 3. SAVE CHANGES
        function saveChanges() {
            const id = idInput.value;
            const newName = nameInput.value;

            if (newName.trim() === "") {
                alert("Please enter a name.");
                return;
            }

            // Update the UI
            const row = document.querySelector(`tr[data-id="${id}"]`);
            row.querySelector('.project-name').innerText = newName;

            closeModal();
            console.log("Updated ID " + id + " to " + newName);
        }

        // 4. DELETE ROW
        function deleteRow(id) {
            if (confirm("Are you sure you want to delete this project?")) {
                const row = document.querySelector(`tr[data-id="${id}"]`);
                row.remove();
                console.log("Deleted ID " + id);
            }
        }

        // Close modal if user clicks outside the box
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
