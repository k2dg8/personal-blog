<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Magmatum</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Magmatum Admin</div>
        <button id="logoutBtn" class="auth-btn" style="width:auto; padding:5px 15px; margin:0;">Logout</button>
    </nav>

    <div class="auth-container" style="margin: 30px auto; max-width: 600px;">
        <h1>Welcome, <span id="userEmail">Admin</span></h1>
        <hr>
        <h3>Publish New Post</h3>
        <form id="postForm">
            <input type="text" id="postTitle" placeholder="Post Title (e.g., Intro to Assembly)" required style="width:100%; margin-bottom:10px; padding:10px;">
            <textarea id="postContent" placeholder="Write your technical thoughts..." required style="width:100%; height:150px; margin-bottom:10px; padding:10px; font-family:sans-serif;"></textarea>
            <button type="submit" class="auth-btn">Publish to Magmatum</button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="./auth.js"></script>
</body>
</html>
