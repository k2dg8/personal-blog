<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - My Personal Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        nav {
            background: #34495e;
            padding: 1rem;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 1.5rem;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .dashboard-container {
            background: white;
            padding: 2rem;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 1rem;
        }
        .dashboard-header h1 {
            color: #2c3e50;
        }
        .admin-badge {
            background: #e74c3c;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #ecf0f1;
            padding: 1.5rem;
            border-radius: 5px;
            text-align: center;
            border-left: 4px solid #3498db;
        }
        .stat-card h3 {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .stat-card .stat-number {
            color: #2c3e50;
            font-size: 2rem;
            font-weight: 700;
        }
        .dashboard-section {
            margin-bottom: 2rem;
        }
        .dashboard-section h2 {
            color: #2c3e50;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #ecf0f1;
        }
        .posts-management {
            background: #f9f9f9;
            padding: 1.5rem;
            border-radius: 5px;
            margin-bottom: 2rem;
        }
        .posts-list {
            background: white;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #ecf0f1;
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-info {
            flex: 1;
        }
        .post-info strong {
            color: #2c3e50;
            display: block;
            margin-bottom: 0.25rem;
        }
        .post-info small {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .post-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn-action {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.3s;
        }
        .btn-action.edit {
            background: #f39c12;
            color: white;
        }
        .btn-action.edit:hover {
            background: #e67e22;
        }
        .btn-action.delete {
            background: #e74c3c;
            color: white;
        }
        .btn-action.delete:hover {
            background: #c0392b;
        }
        .btn-create {
            background: #2ecc71;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-create:hover {
            background: #27ae60;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 5px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 1rem;
        }
        .modal-header h3 {
            color: #2c3e50;
            margin: 0;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #7f8c8d;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2c3e50;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }
        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }
        .btn-save {
            background: #3498db;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-save:hover {
            background: #2980b9;
        }
        .btn-cancel {
            background: #95a5a6;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-cancel:hover {
            background: #7f8c8d;
        }
        .user-list {
            background: #f9f9f9;
            border-radius: 4px;
            overflow: hidden;
        }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #ecf0f1;
        }
        .user-item:last-child {
            border-bottom: none;
        }
        .user-info {
            flex: 1;
        }
        .user-info strong {
            color: #2c3e50;
            display: block;
        }
        .user-info small {
            color: #7f8c8d;
        }
        .user-badge {
            background: #2ecc71;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .dashboard-search {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .dashboard-search input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 1rem;
        }
        .dashboard-search button {
            padding: 0.75rem 1.5rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .dashboard-search button:hover {
            background: #2980b9;
        }
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            background: #ecf0f1;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .filter-btn.active {
            background: #3498db;
            color: white;
            border-color: #2980b9;
        }
        .user-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn-action {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.3s;
        }
        .btn-action.delete {
            background: #e74c3c;
            color: white;
        }
        .btn-action.delete:hover {
            background: #c0392b;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
        }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 2rem;
        }
        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-primary {
            background: #3498db;
            color: white;
        }
        .btn-primary:hover {
            background: #2980b9;
        }
        .btn-secondary {
            background: #e74c3c;
            color: white;
        }
        .btn-secondary:hover {
            background: #c0392b;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
            background: #ecf0f1;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Personal Blog</h1>
        <p>Admin Dashboard</p>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="dashboard.html">Dashboard</a>
    </nav>
    <main>
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1>Admin Dashboard</h1>
                <span class="admin-badge">🔐 Administrator</span>
            </div>

            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <div class="stat-number" id="total-users">0</div>
                </div>
                <div class="stat-card">
                    <h3>Admin Users</h3>
                    <div class="stat-number" id="admin-users">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Posts</h3>
                    <div class="stat-number" id="total-posts">2</div>
                </div>
            </div>

            <div class="dashboard-section">
                <h2>Registered Users</h2>
                <div class="dashboard-search">
                    <input type="text" id="user-search" placeholder="Search users by name, email, or username...">
                    <button onclick="searchUsers()">Search</button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterUsers('all')">All Users</button>
                    <button class="filter-btn" onclick="filterUsers('admin')">Admins Only</button>
                    <button class="filter-btn" onclick="filterUsers('regular')">Regular Users</button>
                </div>
                <div class="user-list" id="user-list">
                    <!-- Users will be loaded here -->
                </div>
            </div>

            <div class="dashboard-section">
                <h2>Posts Management</h2>
                <div class="posts-management">
                    <button class="btn-create" onclick="openCreatePostModal()">+ Create New Post</button>
                </div>
                <div class="posts-list" id="posts-list">
                    <!-- Posts will be loaded here -->
                </div>
            </div>

            <!-- Create/Edit Post Modal -->
            <div id="post-modal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modal-title">Create New Post</h3>
                        <button class="close-modal" onclick="closeModal()">&times;</button>
                    </div>
                    <form id="post-form">
                        <div class="form-group">
                            <label for="post-title">Post Title</label>
                            <input type="text" id="post-title" required>
                        </div>
                        <div class="form-group">
                            <label for="post-content">Post Content</label>
                            <textarea id="post-content" required></textarea>
                        </div>
                        <div class="modal-actions">
                            <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                            <button type="submit" class="btn-save">Save Post</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-primary" onclick="goToProfile()">Back to Profile</button>
                <button class="btn-secondary" onclick="logout()">Sign Out</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 My Personal Blog. All rights reserved.</p>
    </footer>

    <script>
        let allUsers = [];
        let allPosts = [];
        let currentFilter = 'all';
        let editingPostId = null;

        // Check if user is admin
        function checkAdminAccess() {
            const userData = JSON.parse(localStorage.getItem('currentUser'));
            
            const token = localStorage.getItem('authToken');
            if (!token) {
                alert('No authentication token found. Please sign in again.');
                window.location.href = 'sign_in.html';
                return false;
            }

            if (!userData) {
                alert('No user logged in. Redirecting to sign in...');
                window.location.href = 'sign_in.html';
                return false;
            }

            if (userData.role !== 'admin') {
                alert('Access Denied! Admin access required.');
                window.location.href = 'profile.html';
                return false;
            }

            return true;
        }

        // Load all posts from API
        async function loadPosts() {
            const postsList = document.getElementById('posts-list');

            try {
                const response = await fetch('/api/posts');
                allPosts = await response.json();

                if (allPosts.length === 0) {
                    postsList.innerHTML = '<div style="padding: 2rem; text-align: center; color: #7f8c8d;">No posts created yet</div>';
                    return;
                }

                postsList.innerHTML = allPosts.map(post => `
                    <div class="post-item">
                        <div class="post-info">
                            <strong>${post.title}</strong>
                            <small>Created: ${post.date} | Likes: ${post.likes || 0}</small>
                        </div>
                        <div class="post-actions">
                            <button class="btn-action edit" onclick="editPost(${post.id})">Edit</button>
                            <button class="btn-action delete" onclick="deletePost(${post.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading posts:', error);
                postsList.innerHTML = '<div style="padding: 2rem; text-align: center; color: #7f8c8d;">Error loading posts</div>';
            }
        }

        // Open create post modal
        function openCreatePostModal() {
            editingPostId = null;
            document.getElementById('modal-title').textContent = 'Create New Post';
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
            document.getElementById('post-modal').style.display = 'flex';
        }

        // Edit post
        function editPost(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            editingPostId = postId;
            document.getElementById('modal-title').textContent = 'Edit Post';
            document.getElementById('post-title').value = post.title;
            document.getElementById('post-content').value = post.content;
            document.getElementById('post-modal').style.display = 'flex';
        }

        // Delete post
        async function deletePost(postId) {
            if (confirm('Are you sure you want to delete this post?')) {
                try {
                    const response = await fetch(`/api/posts/${postId}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        loadPosts();
                        alert('✓ Post deleted successfully!');
                    } else {
                        alert('Error deleting post');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error deleting post');
                }
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('post-modal').style.display = 'none';
            editingPostId = null;
        }

        // Handle post form submission
        document.getElementById('post-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();

            if (!title || !content) {
                alert('Please fill in all fields');
                return;
            }

            try {
                if (editingPostId) {
                    // Update existing post
                    const response = await fetch(`/api/posts/${editingPostId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            title,
                            content,
                            lastModified: new Date().toLocaleDateString()
                        })
                    });

                    if (response.ok) {
                        alert('✓ Post updated successfully!');
                    } else {
                        alert('Error updating post');
                    }
                } else {
                    // Create new post
                    const response = await fetch('/api/posts', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            title,
                            content
                        })
                    });

                    if (response.ok) {
                        alert('✓ Post created successfully!');
                    } else {
                        alert('Error creating post');
                    }
                }

                loadPosts();
                closeModal();
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving post');
            }
        });

        // Load all users from API
        async function loadUsers() {
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch('/api/users', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                allUsers = await response.json();

                const userData = JSON.parse(localStorage.getItem('currentUser'));
                const userList = document.getElementById('user-list');

                document.getElementById('total-users').textContent = allUsers.length;
                document.getElementById('admin-users').textContent = allUsers.filter(u => u.role === 'admin').length;
                document.getElementById('total-posts').textContent = allPosts.length;
                document.getElementById('admin-join-date').textContent = userData.stats?.joinDate || 'Today';

                if (allUsers.length === 0) {
                    userList.innerHTML = '<div class="empty-state">No users found</div>';
                    return;
                }

                userList.innerHTML = allUsers.map(user => `
                    <div class="user-item">
                        <div class="user-info">
                            <strong>${user.fullName} (@${user.username})</strong>
                            <small>${user.email}</small>
                            <div style="margin-top: 0.5rem; font-size: 0.8rem; color: #7f8c8d;">
                                Posts: ${user.stats?.postsCount || 0} |
                                Comments: ${user.stats?.commentsCount || 0} |
                                Joined: ${user.stats?.joinDate || 'N/A'}
                            </div>
                        </div>
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            <span class="user-badge">${user.role === 'admin' ? '👑 Admin' : '👤 User'}</span>
                            <div class="user-actions">
                                <button class="btn-action delete" onclick="deleteUser('${user.id}')">Remove</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('user-list').innerHTML = '<div class="empty-state">Error loading users</div>';
            }
        }

        // Get all users from localStorage
        function fetchAllUsers() {
            allUsers = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key !== 'currentUser' && key !== 'rememberMe' && !key.includes('stats') && !key.includes('Likes') && key !== 'blogPosts') {
                    try {
                        const user = JSON.parse(localStorage.getItem(key));
                        if (user && user.username) {
                            allUsers.push(user);
                        }
                    } catch (e) {
                        // Skip invalid entries
                    }
                }
            }

            const userData = JSON.parse(localStorage.getItem('currentUser'));
            if (userData && !allUsers.find(u => u.username === userData.username)) {
                allUsers.push(userData);
            }

            // Remove duplicates
            allUsers = allUsers.filter((user, index, self) => 
                index === self.findIndex(u => u.username === user.username)
            );
        }

        // Search users
        function searchUsers() {
            const searchTerm = document.getElementById('user-search').value.toLowerCase();
            
            if (!searchTerm) {
                loadUsers(allUsers);
                return;
            }

            const filtered = allUsers.filter(user => 
                (user.fullName && user.fullName.toLowerCase().includes(searchTerm)) ||
                (user.email && user.email.toLowerCase().includes(searchTerm)) ||
                (user.username && user.username.toLowerCase().includes(searchTerm))
            );

            loadUsers(filtered);
        }

        // Filter users
        function filterUsers(type) {
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            currentFilter = type;
            let filtered = allUsers;

            if (type === 'admin') {
                filtered = allUsers.filter(u => u.isAdmin);
            } else if (type === 'regular') {
                filtered = allUsers.filter(u => !u.isAdmin);
            }

            loadUsers(filtered);
        }

        // Delete user
        function deleteUser(username) {
            if (confirm(`Are you sure you want to remove user "${username}"?`)) {
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                
                if (currentUser.username === username) {
                    alert('You cannot delete your own account!');
                    return;
                }

                localStorage.removeItem(username);
                fetchAllUsers();
                loadUsers();
                alert('✓ User removed successfully!');
            }
        }

        function goToProfile() {
            window.location.href = 'profile.html';
        }

        function logout() {
            localStorage.removeItem('currentUser');
            alert('You have been signed out.');
            window.location.href = 'index.html';
        }

        // Initialize dashboard
        window.addEventListener('load', function() {
            if (checkAdminAccess()) {
                loadPosts();
                loadUsers();
            }
        });

        // Real-time search
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('user-search');
            if (searchInput) {
                searchInput.addEventListener('keyup', function(e) {
                    if (e.key === 'Enter') searchUsers();
                });
            }
        });

        // Close modal when clicking outside
        window.addEventListener('click', function(e) {
            const modal = document.getElementById('post-modal');
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
