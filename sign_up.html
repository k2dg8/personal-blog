<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - My Personal Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        nav {
            background: #34495e;
            padding: 1rem;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 1.5rem;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-container h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2c3e50;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #2980b9;
        }
        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #7f8c8d;
        }
        .form-footer a {
            color: #3498db;
            text-decoration: none;
        }
        .form-footer a:hover {
            text-decoration: underline;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
            background: #ecf0f1;
            margin-top: 3rem;
        }
        .password-strength {
            margin-top: 0.5rem;
            height: 5px;
            background: #ecf0f1;
            border-radius: 3px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }
        .password-strength-text {
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 38px;
            cursor: pointer;
            background: none;
            border: none;
            color: #3498db;
            font-size: 1.2rem;
        }
        .form-group {
            position: relative;
        }
        .form-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        .form-success {
            color: #2ecc71;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        input.error {
            border-color: #e74c3c;
        }
        input.valid {
            border-color: #2ecc71;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Personal Blog</h1>
        <p>Welcome to my corner of the web</p>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="#about">About</a>
        <a href="#posts">Posts</a>
        <a href="#contact">Contact</a>
        <a href="sign_in.html">Sign In</a>
    </nav>
    <main>
        <div class="form-container">
            <h2>Create Your Account</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="full-name" placeholder="John Doe" required>
                    <div id="full-name-error" class="form-error"></div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    <div id="email-error" class="form-error"></div>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                    <div id="username-error" class="form-error"></div>
                    <div id="username-success" class="form-success"></div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 8 characters" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">👁️</button>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="password-strength-bar"></div>
                    </div>
                    <div id="password-strength-text" class="password-strength-text"></div>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirm-password')">👁️</button>
                    <div id="confirm-error" class="form-error"></div>
                </div>
                <div class="form-group">
                    <label for="admin-code">Admin Code <span style="color: #7f8c8d; font-weight: normal;">(Optional)</span></label>
                    <input type="password" id="admin-code" name="admin-code" placeholder="Leave blank if not an admin">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('admin-code')">👁️</button>
                </div>
                <button type="submit">Sign Up</button>
                <div class="form-footer">
                    Already have an account? <a href="sign_in.html">Sign In</a>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 My Personal Blog. All rights reserved.</p>
    </footer>

    <script>
        const signupForm = document.getElementById('signup-form');
        const ADMIN_CODE = 'admin2024';

        // Toggle password visibility
        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }

        // Validate email format
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Check password strength
        function checkPasswordStrength(password) {
            let strength = 0;
            const strengthBar = document.getElementById('password-strength-bar');
            const strengthText = document.getElementById('password-strength-text');

            if (password.length >= 8) strength += 25;
            if (password.length >= 12) strength += 25;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 12;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 13;

            strengthBar.style.width = strength + '%';

            if (strength < 25) {
                strengthBar.style.backgroundColor = '#e74c3c';
                strengthText.textContent = 'Weak password';
            } else if (strength < 50) {
                strengthBar.style.backgroundColor = '#f39c12';
                strengthText.textContent = 'Fair password';
            } else if (strength < 75) {
                strengthBar.style.backgroundColor = '#f1c40f';
                strengthText.textContent = 'Good password';
            } else {
                strengthBar.style.backgroundColor = '#2ecc71';
                strengthText.textContent = 'Strong password';
            }
        }

        // Validate individual fields
        function validateField(fieldId, rule) {
            const field = document.getElementById(fieldId);
            let isValid = true;
            let errorMsg = '';

            if (fieldId === 'email') {
                errorMsg = 'Please enter a valid email address';
                isValid = isValidEmail(field.value);
            } else if (fieldId === 'full-name') {
                errorMsg = 'Full name is required (at least 2 characters)';
                isValid = field.value.trim().length >= 2;
            } else if (fieldId === 'username') {
                errorMsg = 'Username must be 3-20 characters and alphanumeric';
                isValid = /^[a-zA-Z0-9_]{3,20}$/.test(field.value);
            } else if (fieldId === 'password') {
                checkPasswordStrength(field.value);
                errorMsg = 'Password must be at least 8 characters';
                isValid = field.value.length >= 8;
            } else if (fieldId === 'confirm-password') {
                const password = document.getElementById('password').value;
                errorMsg = 'Passwords do not match';
                isValid = field.value === password;
            }

            const errorElement = document.getElementById(`${fieldId}-error`);
            if (errorElement) {
                if (!isValid && field.value) {
                    errorElement.textContent = errorMsg;
                    field.classList.add('error');
                    field.classList.remove('valid');
                } else if (isValid && field.value) {
                    errorElement.textContent = '';
                    field.classList.remove('error');
                    field.classList.add('valid');
                } else {
                    errorElement.textContent = '';
                    field.classList.remove('error', 'valid');
                }
            }

            return isValid;
        }

        // Real-time validation
        document.getElementById('full-name').addEventListener('blur', () => validateField('full-name'));
        document.getElementById('email').addEventListener('blur', () => validateField('email'));
        document.getElementById('username').addEventListener('blur', () => validateField('username'));
        document.getElementById('password').addEventListener('input', () => validateField('password'));
        document.getElementById('confirm-password').addEventListener('blur', () => validateField('confirm-password'));

        // Form submission
        signupForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const fullName = document.getElementById('full-name').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const adminCode = document.getElementById('admin-code').value;

            // Validate all fields
            let allValid = true;
            ['full-name', 'email', 'username', 'password', 'confirm-password'].forEach(fieldId => {
                if (!validateField(fieldId)) allValid = false;
            });

            if (!allValid) {
                alert('Please fix the errors in the form before submitting.');
                return;
            }

            const userData = {
                fullName,
                email,
                username,
                password,
                adminCode: adminCode || undefined
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (response.ok) {
                    // Store user data and JWT token
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    localStorage.setItem('authToken', result.token);

                    if (result.user.role === 'admin') {
                        alert('✓ Welcome Admin! Account created with administrator privileges.');
                    } else {
                        alert('✓ Account created successfully!');
                    }

                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 500);
                } else {
                    alert('Error: ' + (result.error || 'Registration failed'));
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Network error. Please try again.');
            }
        });
    </script>
    </script>
</body>
</html>
