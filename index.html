<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magmatum | Tech & Logic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">MAGMATUM</div>
        <ul class="nav-links">
            <li><a href="#" onclick="showSection('homeSection')">Home</a></li>
            <li id="adminLink" style="display:none;"><a href="#" onclick="showSection('adminSection')">Admin Panel</a></li>
            <li><button class="btn-login" id="authBtn" onclick="showSection('loginSection')">Login</button></li>
        </ul>
    </nav>

    <section id="homeSection" class="page-section">
        <div class="hero">
            <h1>Explore the Logic Loom</h1>
            <p>Latest insights into Backend Development & Cybersecurity.</p>
        </div>
        <div class="container">
            <h2>Recent Posts</h2>
            <div id="postsContainer" class="posts-grid">
                </div>
        </div>
    </section>

    <section id="loginSection" class="page-section" style="display:none;">
        <div class="auth-card">
            <h2 id="authTitle">Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-save" onclick="handleAuth()">Submit</button>
            <p onclick="toggleAuthMode()" id="authToggleText">Don't have an account? Sign Up</p>
        </div>
    </section>

    <section id="adminSection" class="page-section" style="display:none;">
        <div class="container">
            <div class="table-header">
                <h2>Admin Control Panel</h2>
                <button class="btn-add" onclick="openPostModal()">+ Create New Post</button>
            </div>
            <table id="adminTable">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </section>

    <div id="postModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle">New Post</h3>
            <input type="hidden" id="editPostId">
            <input type="text" id="postTitleInput" placeholder="Post Title">
            <textarea id="postContentInput" placeholder="Post content..."></textarea>
            <div class="modal-footer">
                <button class="btn-save" onclick="savePost()">Publish</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
