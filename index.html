<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        nav {
            background: #34495e;
            padding: 1rem;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 1.5rem;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .post {
            background: white;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .post-title {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .post-date {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
            background: #ecf0f1;
            margin-top: 3rem;
        }
        .search-bar {
            margin-bottom: 2rem;
            display: flex;
            gap: 0.5rem;
        }
        .search-bar input, .search-bar select {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 1rem;
        }
        .search-bar button {
            padding: 0.75rem 1.5rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .search-bar button:hover {
            background: #2980b9;
        }
        .posts-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 5px;
        }
        .sort-options {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }
        .pagination button {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .pagination button.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .post-category {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .post-tags {
            margin: 0.5rem 0;
        }
        .post-tags span {
            display: inline-block;
            background: #ecf0f1;
            color: #2c3e50;
            padding: 0.1rem 0.3rem;
            border-radius: 2px;
            font-size: 0.8rem;
            margin-right: 0.5rem;
        }
        .post-author {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .post-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 1rem;
        }
        .user-status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: white;
            padding: 0.75rem 1rem;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 0.9rem;
            z-index: 1000;
        }
        .user-status.logged-in {
            background: #2ecc71;
            color: white;
        }
        .post-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #ecf0f1;
        }
        .btn-like, .btn-share {
            border: none;
            background: #ecf0f1;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .btn-like:hover {
            background: #e74c3c;
            color: white;
        }
        .btn-share:hover {
            background: #3498db;
            color: white;
        }
        .btn-like.liked {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Personal Blog</h1>
        <p>Welcome to my corner of the web</p>
    </header>
    <nav>
        <a href="index.html" class="nav-link active">Home</a>
        <a href="#about" class="nav-link">About</a>
        <a href="#posts" class="nav-link">Posts</a>
        <a href="#contact" class="nav-link">Contact</a>
        <a href="sign_up.html" class="nav-link">Sign Up</a>
        <a href="sign_in.html" class="nav-link">Sign In</a>
    </nav>
    <div class="user-status" id="user-status">Not Logged In</div>
    <main>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search posts..." onkeyup="searchPosts()">
            <select id="category-filter" onchange="filterByCategory()">
                <option value="">All Categories</option>
            </select>
        </div>
        <div class="posts-controls">
            <div class="sort-options">
                <label>Sort by:</label>
                <select id="sort-select" onchange="sortPosts()">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="most-liked">Most Liked</option>
                    <option value="most-viewed">Most Viewed</option>
                </select>
            </div>
        </div>
        <div id="posts-container">
            <!-- Posts will be loaded here -->
        </div>
        <div class="pagination" id="pagination-controls">
            <!-- Pagination controls will be loaded here -->
        </div>
    </main>
    <footer>
        <p>&copy; 2024 My Personal Blog. All rights reserved.</p>
    </footer>

    <script>
        let postsData = [];
        let currentPage = 1;
        let totalPages = 1;
        let categories = [];
        let currentSearch = '';
        let currentCategory = '';
        let currentSort = 'newest';

        // Load posts from API with pagination
        async function loadPostsData(page = 1) {
            try {
                const params = new URLSearchParams({
                    page: page,
                    limit: 5, // Posts per page
                    search: currentSearch,
                    category: currentCategory
                });

                const response = await fetch(`/api/posts?${params}`);
                const result = await response.json();

                postsData = result.posts;
                currentPage = result.pagination.currentPage;
                totalPages = result.pagination.totalPages;

                displayPosts();
                updatePagination();
            } catch (error) {
                console.error('Error loading posts:', error);
                document.getElementById('posts-container').innerHTML =
                    '<p style="text-align: center; color: #e74c3c; padding: 2rem;">Error loading posts. Please try again later.</p>';
            }
        }

        // Load categories
        async function loadCategories() {
            try {
                const response = await fetch('/api/categories');
                categories = await response.json();
                const categoryFilter = document.getElementById('category-filter');

                categoryFilter.innerHTML = '<option value="">All Categories</option>';
                categories.forEach(category => {
                    categoryFilter.innerHTML += `<option value="${category}">${category}</option>`;
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        // Display posts
        function displayPosts() {
            const container = document.getElementById('posts-container');

            if (postsData.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #7f8c8d; padding: 2rem;">No posts found.</p>';
                return;
            }

            container.innerHTML = postsData.map(post => `
                <article class="post">
                    <div class="post-category">${post.category || 'General'}</div>
                    <h2 class="post-title">${post.title}</h2>
                    <div class="post-author">By ${post.author.fullName} (@${post.author.username})</div>
                    <p class="post-date">📅 ${new Date(post.date).toLocaleDateString()}</p>
                    <p>${post.content.length > 200 ? post.content.substring(0, 200) + '...' : post.content}</p>
                    ${post.tags && post.tags.length > 0 ? `
                        <div class="post-tags">
                            ${post.tags.map(tag => `<span>#${tag}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="post-stats">
                        <span>❤️ ${post.likes || 0} likes</span>
                        <span>👁️ ${post.views || 0} views</span>
                        <span>💬 ${post.commentsCount || 0} comments</span>
                    </div>
                    <div class="post-actions">
                        <button class="btn-like ${isPostLiked(post.id) ? 'liked' : ''}" onclick="toggleLike(${post.id})" data-post-id="${post.id}">
                            ❤️ Like (<span id="likes-${post.id}">${post.likes || 0}</span>)
                        </button>
                        <button class="btn-share" onclick="sharePost(${post.id})">📤 Share</button>
                        <button class="btn-comment" onclick="viewPost(${post.id})">💬 Comments</button>
                    </div>
                </article>
            `).join('');
        }

        // Check if user liked a post
        function isPostLiked(postId) {
            const userData = JSON.parse(localStorage.getItem('currentUser'));
            if (!userData) return false;

            const post = postsData.find(p => p.id === postId);
            return post && post.likedBy && post.likedBy.includes(userData.id);
        }

        // Update pagination controls
        function updatePagination() {
            const paginationContainer = document.getElementById('pagination-controls');
            let paginationHTML = '';

            if (totalPages > 1) {
                // Previous button
                paginationHTML += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>`;

                // Page numbers
                for (let i = 1; i <= totalPages; i++) {
                    if (i === currentPage) {
                        paginationHTML += `<button class="active" disabled>${i}</button>`;
                    } else {
                        paginationHTML += `<button onclick="changePage(${i})">${i}</button>`;
                    }
                }

                // Next button
                paginationHTML += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`;
            }

            paginationContainer.innerHTML = paginationHTML;
        }

        // Change page
        function changePage(page) {
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                loadPostsData(page);
            }
        }

        // Search posts
        function searchPosts() {
            currentSearch = document.getElementById('search-input').value.trim();
            currentPage = 1;
            loadPostsData(1);
        }

        // Filter by category
        function filterByCategory() {
            currentCategory = document.getElementById('category-filter').value;
            currentPage = 1;
            loadPostsData(1);
        }

        // Sort posts (client-side sorting for current page)
        function sortPosts() {
            currentSort = document.getElementById('sort-select').value;

            postsData.sort((a, b) => {
                switch (currentSort) {
                    case 'oldest':
                        return new Date(a.date) - new Date(b.date);
                    case 'most-liked':
                        return (b.likes || 0) - (a.likes || 0);
                    case 'most-viewed':
                        return (b.views || 0) - (a.views || 0);
                    case 'newest':
                    default:
                        return new Date(b.date) - new Date(a.date);
                }
            });

            displayPosts();
        }

        // Check user login status
        function updateUserStatus() {
            const userData = JSON.parse(localStorage.getItem('currentUser'));
            const userStatus = document.getElementById('user-status');
            
            if (userData) {
                userStatus.className = 'user-status logged-in';
                userStatus.innerHTML = `✓ Logged in as <strong>${userData.username}</strong>`;
            } else {
                userStatus.className = 'user-status';
                userStatus.textContent = 'Not Logged In';
            }
        }

        // Toggle like on post
        async function toggleLike(postId) {
            const token = localStorage.getItem('authToken');
            if (!token) {
                alert('Please sign in to like posts');
                return;
            }

            try {
                const response = await fetch(`/api/posts/${postId}/like`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    const button = document.querySelector(`[data-post-id="${postId}"]`);
                    const likesSpan = document.getElementById(`likes-${postId}`);

                    if (result.isLiked) {
                        button.classList.add('liked');
                    } else {
                        button.classList.remove('liked');
                    }

                    likesSpan.textContent = result.likes;

                    // Update local data
                    const post = postsData.find(p => p.id === postId);
                    if (post) {
                        post.likes = result.likes;
                    }
                } else {
                    const error = await response.json();
                    alert('Error: ' + error.error);
                }
            } catch (error) {
                console.error('Error toggling like:', error);
                alert('Network error. Please try again.');
            }
        }

        // View post with comments
        function viewPost(postId) {
            // For now, just show an alert. In a full implementation, this would open a modal or navigate to a post detail page
            const post = postsData.find(p => p.id === postId);
            if (post) {
                alert(`Viewing post: ${post.title}\n\nComments: ${post.commentsCount || 0}\n\nThis feature would open a detailed view with comments in a full implementation.`);
            }
        }

        // Share post
        function sharePost(postId) {
            const post = postsData.find(p => p.id === postId);
            if (post) {
                const shareText = `Check out this post: "${post.title}" on My Personal Blog!\n\n${window.location.origin}/post/${post.id}`;

                if (navigator.share) {
                    navigator.share({
                        title: 'My Personal Blog',
                        text: shareText,
                        url: window.location.href
                    });
                } else {
                    navigator.clipboard.writeText(shareText).then(() => {
                        alert('Post link copied to clipboard!');
                    }).catch(() => {
                        alert('Share text: ' + shareText);
                    });
                }
            }
        }

        // Initialize on page load
        window.addEventListener('load', function() {
            loadCategories();
            loadPostsData();
            updateUserStatus();
        });

        // Refresh posts when page becomes visible (in case admin made changes)
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                loadPostsData();
            }
        });

        // Real-time search
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('keyup', function(e) {
                    if (e.key === 'Enter') searchPosts();
                });
            }
        });
    </script>
</body>
</html>
