<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - My Personal Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        nav {
            background: #34495e;
            padding: 1rem;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 1.5rem;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-container h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2c3e50;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #2980b9;
        }
        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #7f8c8d;
        }
        .form-footer a {
            color: #3498db;
            text-decoration: none;
        }
        .form-footer a:hover {
            text-decoration: underline;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 0.5rem;
        }
        .checkbox-group label {
            margin-bottom: 0;
            display: inline;
            font-weight: normal;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
            background: #ecf0f1;
            margin-top: 3rem;
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 38px;
            cursor: pointer;
            background: none;
            border: none;
            color: #3498db;
            font-size: 1.2rem;
        }
        .form-group {
            position: relative;
        }
        .form-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        input.error {
            border-color: #e74c3c;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Personal Blog</h1>
        <p>Welcome to my corner of the web</p>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="#about">About</a>
        <a href="#posts">Posts</a>
        <a href="#contact">Contact</a>
        <a href="sign_up.html">Sign Up</a>
    </nav>
    <main>
        <div class="form-container">
            <h2>Welcome Back</h2>
            <form id="signin-form">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
                    <div id="username-error" class="form-error"></div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">👁️</button>
                    <div id="password-error" class="form-error"></div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <button type="submit">Sign In</button>
                <div class="form-footer">
                    Don't have an account? <a href="sign_up.html">Sign Up</a><br>
                    <a href="#">Forgot your password?</a>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 My Personal Blog. All rights reserved.</p>
    </footer>

    <script>
        const signinForm = document.getElementById('signin-form');

        // Toggle password visibility
        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }

        // Validate form fields
        function validateField(fieldId) {
            const field = document.getElementById(fieldId);
            const errorElement = document.getElementById(`${fieldId}-error`);
            let isValid = true;
            let errorMsg = '';

            if (fieldId === 'username') {
                errorMsg = 'Please enter your username or email';
                isValid = field.value.trim().length > 0;
            } else if (fieldId === 'password') {
                errorMsg = 'Please enter your password';
                isValid = field.value.length > 0;
            }

            if (errorElement) {
                if (!isValid && field.value) {
                    errorElement.textContent = errorMsg;
                    field.classList.add('error');
                } else {
                    errorElement.textContent = '';
                    field.classList.remove('error');
                }
            }

            return isValid;
        }

        // Real-time validation
        document.getElementById('username').addEventListener('blur', () => validateField('username'));
        document.getElementById('password').addEventListener('blur', () => validateField('password'));

        // Form submission
        signinForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember').checked;

            // Validate fields
            if (!validateField('username') || !validateField('password')) {
                alert('Please fill in all fields correctly.');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // Store user data and JWT token
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    localStorage.setItem('authToken', result.token);

                    if (rememberMe) {
                        localStorage.setItem('rememberMe', 'true');
                    }

                    alert('✓ Sign in successful!');
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 500);
                } else {
                    alert('Invalid username or password. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error. Please try again.');
            }
        });
    </script>
</body>
</html>
